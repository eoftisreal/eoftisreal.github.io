<!doctype html>
<html lang="en">
  <head>
    <!-- Essential Meta Tags -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Meta Tags -->
    <title>Kapda Kraft - Premium Clothing & Accessories Online</title>
    <meta name="description" content="Discover premium quality clothing and accessories at Kapda Kraft. Curated collections designed for the modern aesthetic. Shop the latest trends today." />
    <meta name="keywords" content="clothing, fashion, accessories, online shopping, premium clothing, men's wear, women's wear, fashion accessories" />

    <!-- Open Graph Tags (Social Sharing) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Kapda Kraft - Premium Clothing & Accessories Online" />
    <meta property="og:description" content="Discover premium quality clothing and accessories at Kapda Kraft. Curated collections designed for the modern aesthetic. Shop the latest trends today." />
    <meta property="og:url" content="https://kapdakraft.live/" />
    <meta property="og:site_name" content="Kapda Kraft" />
    <meta property="og:image" content="https://kapdakraft.live/logo.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Kapda Kraft - Premium Fashion Destination" />

    <!-- Twitter Card Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Kapda Kraft - Premium Clothing & Accessories" />
    <meta name="twitter:description" content="Shop premium quality clothing and accessories. Curated collections for modern aesthetic. Discover exclusive styles at Kapda Kraft." />
    <meta name="twitter:image" content="https://kapdakraft.live/logo.png" />

    <!-- Favicon & Apple Touch Icon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- Theme & Style Configuration -->
    <meta name="theme-color" content="#111111" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Kapda Kraft" />

    <!-- Canonical URL (for homepage) -->
    <link rel="canonical" href="https://kapdakraft.live/" />

    <!-- Robots Meta Tags -->
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />

    <!-- Additional Meta Tags -->
    <meta name="author" content="Kapda Kraft" />
    <meta name="copyright" content="2024 Kapda Kraft. All rights reserved." />
    <meta name="language" content="English" />
    <meta name="revisit-after" content="7 days" />

    <!-- Structured Data (JSON-LD) for Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Kapda Kraft",
      "url": "https://kapdakraft.live/",
      "logo": "https://kapdakraft.live/logo.png",
      "description": "Premium destination for high-quality clothing and accessories",
      "sameAs": [
        "https://www.facebook.com/kapdakraft",
        "https://www.instagram.com/kapdakraft",
        "https://www.twitter.com/kapdakraft"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "Customer Service",
        "url": "https://kapdakraft.live/contact"
      }
    }
    </script>

    <!-- Structured Data (JSON-LD) for Website -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Kapda Kraft",
      "url": "https://kapdakraft.live/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://kapdakraft.live/products?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Preconnect to External Resources (Performance) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Sitemap Link for Crawlers -->
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
