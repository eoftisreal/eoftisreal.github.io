<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather & PDF Tools</title>
    <link rel="stylesheet" href="style.css">
    <!-- Load pdf-lib library -->
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
</head>
<body>

<!-- Top Weather Bar -->
<nav class="weather-bar">
    <div class="weather-info">
        <img src="images/rain.png" class="weather-icon-small">
        <div class="weather-text">
            <span class="temp">--°c</span>
            <span class="city">Loading...</span>
        </div>
    </div>

    <div class="search-compact">
        <input type="text" placeholder="Search City" spellcheck="false">
        <button id="searchBtn"><img src="images/search.png"></button>
        <button id="locationBtn" title="Use My Location">📍</button>
    </div>

    <!-- Hidden container to keep existing JS happy without breaking or complex refactor yet -->
    <div class="weather" style="display: none;">
        <!-- These are used by script.js but might not be shown in the top bar -->
        <div class="date-time"></div>
        <img src="images/rain.png" class="weather-icon">
        <p class="feels-like">Feels like: <span>--</span></p>
        <div class="humidity">--</div>
        <div class="wind">--</div>
        <div class="forecast"></div>
    </div>
    <div class="error" style="display: none;">
        <p>Invalid city name</p>
    </div>
</nav>

<!-- Main Content Area -->
<main>
    <h1 class="site-title">📄 PDF Tools</h1>

    <div class="card pdf-tool">
        <h2>PDF Page Combiner & Rotator</h2>
        <p class="description">Upload a PDF to rotate, resize, and combine pages with flexible options.</p>

        <div class="upload-section">
            <input type="file" id="pdfInput" accept=".pdf">
            <label for="pdfInput" class="file-label">Choose PDF File</label>
            <span id="fileName">No file chosen</span>
        </div>

        <div class="options-grid">
            <div class="option-group">
                <label for="rotationAngle">Rotation</label>
                <select id="rotationAngle">
                    <option value="0">0°</option>
                    <option value="90" selected>90°</option>
                    <option value="180">180°</option>
                    <option value="270">270° (−90°)</option>
                </select>
            </div>

            <div class="option-group">
                <label for="pageSize">Page Size</label>
                <select id="pageSize">
                    <option value="a4-portrait" selected>A4 Portrait</option>
                    <option value="a4-landscape">A4 Landscape</option>
                    <option value="a5-portrait">A5 Portrait</option>
                    <option value="a5-landscape">A5 Landscape</option>
                    <option value="letter-portrait">Letter Portrait</option>
                    <option value="letter-landscape">Letter Landscape</option>
                    <option value="legal-portrait">Legal Portrait</option>
                    <option value="legal-landscape">Legal Landscape</option>
                </select>
            </div>

            <div class="option-group">
                <label for="pagesPerSheet">Pages per Sheet</label>
                <select id="pagesPerSheet">
                    <option value="1">1</option>
                    <option value="2" selected>2</option>
                    <option value="4">4 (2×2)</option>
                </select>
            </div>

            <div class="option-group">
                <label for="unchangedPages">Keep Unchanged</label>
                <input type="text" id="unchangedPages" placeholder="e.g. 1 or 1-3 or 1,4,6" title="Pages to keep as-is (e.g. 1 or 1-3 or 1,4,6)">
            </div>
        </div>

        <button id="processBtn" disabled>Process & Download</button>

        <div id="status"></div>
    </div>
</main>

<footer class="last-updated">
    Last updated: <span id="lastUpdated">2026-02-21 12:44 UTC</span>
</footer>

<script src="script.js"></script>

</body>
</html>
